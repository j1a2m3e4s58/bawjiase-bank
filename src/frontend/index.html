<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BCB Demo</title>
    <meta
      name="description"
      content="BCB demo prototype for testing and presentation only."
    />
    <meta name="theme-color" content="#0f1115" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="BCB Demo" />
    <meta property="og:title" content="BCB Demo" />
    <meta
      property="og:description"
      content="Demo prototype for testing and presentation only."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("bcb_theme") === "light" ? "light" : "dark";
          var root = document.documentElement;
          root.classList.toggle("dark", theme === "dark");
          root.style.colorScheme = theme;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute("content", theme === "dark" ? "#0f1115" : "#f8fafc");
        } catch (error) {
          document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const redirect = params.get("redirect");
        if (!redirect || window.location.pathname !== "/") return;

        const nextUrl = `${redirect}${window.location.hash || ""}`;
        window.history.replaceState(null, "", nextUrl);
      })();
    </script>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
